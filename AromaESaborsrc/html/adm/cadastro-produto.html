<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="../../js/cadastro-produto.js"></script>
<title>Cadastro de produtos</title>
</head>

<body class="bg-[#F2E3C6]">

  <header>
    <iframe src="./menuAdm.html" class="w-full h-36 border-none"></iframe>
  </header>

  <main class="flex justify-center items-center min-h-screen">
    <div class="bg-white shadow-xl rounded-2xl p-8 flex flex-col md:flex-row gap-8 max-w-5xl w-full">

      <!-- Imagem lateral -->
      <div class="flex justify-center items-center">
        <img src="../../img/undraw_coffee-time_98vi (1).svg" alt="Ilustração" class="w-80">
      </div>

      <!-- Formulário -->
      <div class="flex-1">
        <h1 class="text-3xl font-semibold text-center mb-6 text-gray-800">Cadastro de Produtos</h1>

        <form id="cadastroProduto" action="#" method="post" enctype="multipart/form-data" class="space-y-4">

          <!-- Nome -->
          <div>
            <label for="name" class="block font-medium text-gray-700">Nome do produto</label>
            <input type="text" id="name" name="name" placeholder="Digite o nome do produto" 
              class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
          </div>

          <!-- Descrição -->
          <div>
            <label for="description" class="block font-medium text-gray-700">Descrição do produto</label>
            <textarea id="description" name="description" placeholder="Descreva o produto"
              class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
          </div>

          <!-- Tamanho -->
          <div>
            <label for="size" class="block font-medium text-gray-700">Tamanho do produto</label>
            <input type="text" id="size" name="size" placeholder="Digite o tamanho do produto" 
              class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
          </div>

          <!-- Preço -->
          <div>
            <label for="price" class="block font-medium text-gray-700">Preço</label>
            <input type="number" id="price" name="price" placeholder="Digite o preço do produto"
              class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
              required min="0" step=".01">
          </div>

          <!-- Imagem -->
          <div>
            <label for="image" class="block font-medium text-gray-700">Imagem do Produto</label>
            <input type="file" id="image" name="image" accept="image/*"
              class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>

          <!-- Categoria -->
          <fieldset class="border border-gray-300 rounded-md p-4">
            <legend class="font-semibold text-gray-700 px-2">Categoria</legend>
            
            <div class="flex flex-wrap gap-4 mt-2">
              <label class="flex items-center gap-2">
                <input type="radio" id="cafe" name="type" value="cafe" required>
                Café
              </label>
              
              <label class="flex items-center gap-2">
                <input type="radio" id="cha" name="type" value="cha" required>
                Chá
              </label>
              
              <label class="flex items-center gap-2">
                <input type="radio" id="salgado" name="type" value="salgado" required>
                Salgado
              </label>
              
              <label class="flex items-center gap-2">
                <input type="radio" id="sobremesa" name="type" value="sobremesa" required>
                Sobremesa
              </label>
            </div>
          </fieldset>

          <!-- Botões -->
          <div class="flex gap-4 justify-center">
            <button type="submit" name="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md shadow-md">
              Cadastrar
            </button>
            
            <button type="reset" name="reset"
              class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-2 rounded-md shadow-md">
              Limpar
            </button>
          </div>

        </form>
      </div>
    </div>
  </main>

</body>
</html>
