<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos Cadastrados</title>
	<script defer src="../../js/adm-produto.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F2E3C6] min-h-screen">

    <!-- Cabeçalho -->
    <header class="w-full">
        <iframe src="./menuAdm.html" class="w-full h-[140px] border-none"></iframe>
    </header>

    <!-- Conteúdo -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Produtos Cadastrados</h1>

        <!-- Tabela -->
        <div class="overflow-x-auto bg-white rounded-lg shadow-md">
            <table class="w-full table-auto">
                <thead class="bg-gray-700 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left">Imagem</th>
                        <th class="px-4 py-3 text-left">Nome</th>
                        <th class="px-4 py-3 text-left">Descrição</th>
                        <th class="px-4 py-3 text-left">Preço (R$)</th>
                        <th class="px-4 py-3 text-left">Categoria</th>
                        <th class="px-4 py-3 text-left">Tamanho</th>
                        <th class="px-4 py-3 text-center">Editar</th>
                        <th class="px-4 py-3 text-center">Excluir</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos" class="text-gray-700">
                    <!-- Dados carregados via JS -->
                </tbody>
            </table>
        </div>

        <!-- Modal de Edição -->
        <div id="modal-editar"
            class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-lg">
                <h2 class="text-2xl font-semibold mb-4">Editar Produto</h2>
                <form id="form-editar" class="space-y-4">
                    <input type="hidden" id="editar-id">

                    <div>
                        <label class="block mb-1 font-medium">Nome:</label>
                        <input type="text" id="editar-nome"
                            class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
                            required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Descrição:</label>
                        <textarea id="editar-descricao"
                            class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
                            required></textarea>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Preço (R$):</label>
                        <input type="number" id="editar-preco" step="0.01"
                            class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
                            required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Tamanho:</label>
                        <input type="text" id="editar-size"
                            class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300"
                            required>
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Categoria:</label>
                        <input type="text" id="editar-categoria"
                            class="w-full border rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-300">
                    </div>

                    <div class="flex justify-end gap-4 pt-4">
                        <button type="button" onclick="fecharModalEditar()"
                            class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">Cancelar</button>
                        <button type="submit"
                            class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal de Exclusão -->
        <div id="modal-excluir"
            class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
            <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-sm">
                <h2 class="text-xl font-semibold mb-4">Confirmar Exclusão</h2>
                <p class="mb-6">Tem certeza que deseja excluir este produto?</p>
                <div class="flex justify-end gap-4">
                    <button onclick="fecharModalExcluir()"
                        class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">Não</button>
                    <button onclick="confirmarExclusao()"
                        class="px-4 py-2 rounded bg-red-600 text-white hover:bg-red-700">Sim</button>
                </div>
            </div>
        </div>

    </main>

</body>

</html>
