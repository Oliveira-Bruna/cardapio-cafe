<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="../js/cardapio.js"></script>
</head>

<body class="bg-gray-50">

    <header>
        <object data="./menu.html" width="100%" height="120px"></object>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">

        <h1 class="text-3xl font-bold text-center mb-8">CARDÁPIO</h1>

        <section class="menu">
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="menu">
                <!-- Item -->
                <div class="border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <img class="w-full h-40 object-cover rounded-md"
                        src="https://img.freepik.com/vetores-gratis/xicara-realista-de-cafe-preto-na-ilustracao-vetorial-de-pires_1284-66002.jpg"
                        alt="Café Expresso">
                    <h3 class="text-xl font-semibold mt-4">Café Expresso</h3>
                    <p class="text-lg text-green-600">R$ 5,00</p>
                </div>

                <!-- Você pode copiar este bloco e alterar os dados para os outros produtos -->

                <div class="border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <img class="w-full h-40 object-cover rounded-md"
                        src="https://img.freepik.com/vetores-gratis/ilustracao-de-icone-vetorial-realista-3d-taca-de-cafe-branca-bebida-de-cappuccino-isolada-em-fundo-branco_134830-2254.jpg"
                        alt="Cappuccino">
                    <h3 class="text-xl font-semibold mt-4">Cappuccino</h3>
                    <p class="text-lg text-green-600">R$ 8,00</p>
                </div>

                <div class="p-4 relative border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <div class="absolute top-2 left-2 bg-blue-500 text-white text-xs px-2 py-0.5 rounded">
                        Café
                    </div>
                    <img class="w-full h-40 object-cover rounded"
                        src="https://img.freepik.com/vetores-gratis/xicara-realista-de-cafe-preto-na-ilustracao-vetorial-de-pires_1284-66002.jpg"
                        alt="Café Expresso">

                    <h3 class="text-lg font-semibold mt-2">Café Expresso</h3>
                    <p class="text-lg text-green-600">R$ 5,00</p>
                </div>


                <div class="border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <img class="w-full h-40 object-cover rounded-md"
                        src="https://img.freepik.com/fotos-gratis/porcao-de-brownie-de-chocolate-isolada-em-fundo-branco_123827-27904.jpg"
                        alt="Brownie">
                    <h3 class="text-xl font-semibold mt-4">Brownie</h3>
                    <p class="text-lg text-green-600">R$ 7,50</p>
                </div>

                <div class="border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <img class="w-full h-40 object-cover rounded-md"
                        src="https://img.freepik.com/psd-gratuitas/vida-morta-de-doces-mexicanos-isolados_23-2151338235.jpg"
                        alt="Pão de Queijo">
                    <h3 class="text-xl font-semibold mt-4">Pão de Queijo</h3>
                    <p class="text-lg text-green-600">R$ 4,50</p>
                </div>

                <div class="border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <img class="w-full h-40 object-cover rounded-md"
                        src="https://img.freepik.com/fotos-gratis/sanduiche_1339-1108.jpg" alt="Sanduíche Natural">
                    <h3 class="text-xl font-semibold mt-4">Sanduíche Natural</h3>
                    <p class="text-lg text-green-600">R$ 10,00</p>
                </div>

                <div class="border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <img class="w-full h-40 object-cover rounded-md"
                        src="https://img.freepik.com/fotos-gratis/copo-com-leite-e-chocolate_23-2148937239.jpg"
                        alt="Café Gelado">
                    <h3 class="text-xl font-semibold mt-4">Café Gelado</h3>
                    <p class="text-lg text-green-600">R$ 7,00</p>
                </div>

                <div class="border rounded-xl bg-white shadow-md p-4 flex flex-col items-center">
                    <img class="w-full h-40 object-cover rounded-md"
                        src="https://img.freepik.com/fotos-gratis/copo-de-cha-vermelho_23-2148170684.jpg"
                        alt="Chá de Hibisco">
                    <h3 class="text-xl font-semibold mt-4">Chá de Hibisco</h3>
                    <p class="text-lg text-green-600">R$ 5,50</p>
                </div>

            </div>
        </section>

    </main>

</body>

</html>
